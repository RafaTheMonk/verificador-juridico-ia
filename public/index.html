<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificador Juridico IA</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0f1117;
  color: #e2e8f0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  padding: 2rem 1rem;
  min-height: 100vh;
}

.wrap { max-width: 820px; margin: 0 auto; }

h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: .3rem; }
.sub { color: #64748b; font-size: .88rem; margin-bottom: 2rem; }

.card {
  background: #1a1d27;
  border: 1px solid #2a2d3a;
  border-radius: 10px;
  padding: 1.4rem;
  margin-bottom: 1.2rem;
}

.casos { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
.caso-label { color: #64748b; font-size: .78rem; }
.caso-btn {
  background: #0f1117;
  border: 1px solid #2a2d3a;
  color: #94a3b8;
  border-radius: 6px;
  padding: .3rem .7rem;
  font-size: .78rem;
  cursor: pointer;
}
.caso-btn:hover { border-color: #6366f1; color: #e2e8f0; }

label { display: block; font-size: .75rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem; }
input, textarea {
  width: 100%;
  background: #0f1117;
  border: 1px solid #2a2d3a;
  border-radius: 7px;
  color: #e2e8f0;
  font-size: .92rem;
  font-family: inherit;
  padding: .6rem .85rem;
  outline: none;
}
input:focus, textarea:focus { border-color: #6366f1; }
textarea { min-height: 100px; resize: vertical; }
.field { margin-bottom: 1rem; }

.btn {
  width: 100%;
  background: #6366f1;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: .95rem;
  font-weight: 600;
  padding: .75rem;
  cursor: pointer;
  margin-top: .5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
}
.btn:hover { background: #4f46e5; }
.btn:disabled { background: #3a3d5c; cursor: not-allowed; }

.spinner {
  width: 15px; height: 15px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

.progress {
  height: 3px;
  background: #2a2d3a;
  border-radius: 99px;
  overflow: hidden;
  margin-top: .8rem;
  display: none;
}
.progress-bar {
  height: 100%;
  width: 35%;
  background: #6366f1;
  border-radius: 99px;
  animation: slide 1.1s ease-in-out infinite;
}
@keyframes slide { 0% { transform: translateX(-150%); } 100% { transform: translateX(400%); } }

.warn {
  background: rgba(234,179,8,.08);
  border: 1px solid rgba(234,179,8,.25);
  border-radius: 8px;
  padding: .8rem 1rem;
  color: #fde047;
  font-size: .83rem;
  margin-bottom: 1rem;
  display: none;
  line-height: 1.6;
}
.warn code { background: rgba(255,255,255,.1); border-radius: 3px; padding: .1rem .35rem; font-family: monospace; }

.err {
  background: rgba(239,68,68,.08);
  border: 1px solid rgba(239,68,68,.25);
  border-radius: 8px;
  padding: .9rem 1.1rem;
  color: #fca5a5;
  font-size: .88rem;
}

/* resultado */
.banner {
  border-radius: 10px;
  padding: 1.2rem 1.4rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: .6rem;
  margin-bottom: 1.2rem;
}
.banner-ref  { font-size: .82rem; opacity: .75; margin-bottom: .25rem; }
.banner-rec  { font-size: 1.55rem; font-weight: 800; }
.banner-urg  { font-size: .75rem; font-weight: 700; background: rgba(0,0,0,.25); padding: .25rem .65rem; border-radius: 20px; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }

.card h2 { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #64748b; margin-bottom: .9rem; }

.row { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; margin-bottom: .55rem; font-size: .86rem; }
.rk  { color: #64748b; flex-shrink: 0; }
.rv  { font-weight: 500; text-align: right; word-break: break-all; }
a    { color: #6366f1; text-decoration: none; font-size: .8rem; }
a:hover { text-decoration: underline; }

.pill { display: inline-block; font-size: .7rem; font-weight: 700; padding: .18rem .52rem; border-radius: 20px; letter-spacing: .03em; }

.flags { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .3rem; }
.flag  { font-size: .68rem; background: rgba(255,255,255,.05); border: 1px solid #2a2d3a; border-radius: 4px; padding: .13rem .4rem; color: #64748b; }

.just {
  background: #0f1117;
  border: 1px solid #2a2d3a;
  border-radius: 7px;
  padding: .7rem .9rem;
  font-size: .86rem;
  line-height: 1.55;
  margin-top: .5rem;
}

.motivo { font-size: .81rem; color: #64748b; padding: .28rem 0; border-bottom: 1px solid #2a2d3a; line-height: 1.45; }
.motivo:last-child { border-bottom: none; }
.motivo::before { content: "→ "; color: #6366f1; }

/* cores recomendacao */
.bg-manter     { background: rgba(34,197,94,.13);  }
.bg-corrigir   { background: rgba(234,179,8,.13);  }
.bg-revisar    { background: rgba(249,115,22,.13); }
.bg-substituir { background: rgba(249,115,22,.13); }
.bg-remover    { background: rgba(239,68,68,.13);  }

.c-manter     { color: #22c55e; }
.c-corrigir   { color: #eab308; }
.c-revisar    { color: #f97316; }
.c-substituir { color: #f97316; }
.c-remover    { color: #ef4444; }

/* pills adequacao */
.p-ALTO    { background: rgba(99,102,241,.15); color: #818cf8; }
.p-MEDIO   { background: rgba(59,130,246,.15); color: #60a5fa; }
.p-BAIXO   { background: rgba(100,116,139,.15); color: #64748b; }
.p-NULO    { background: rgba(239,68,68,.1); color: #fca5a5; }

.t-ADEQUADO      { background: rgba(34,197,94,.15); color: #22c55e; }
.t-PARCIAL       { background: rgba(234,179,8,.15); color: #eab308; }
.t-INADEQUADO    { background: rgba(239,68,68,.15); color: #ef4444; }
.t-INDETERMINADO { background: rgba(100,116,139,.1); color: #64748b; }

.d-UTIL              { background: rgba(34,197,94,.15); color: #22c55e; }
.d-INUTIL            { background: rgba(239,68,68,.15); color: #ef4444; }
.d-REVISAR_CONTRA_TESE { background: rgba(249,115,22,.15); color: #f97316; }
.d-INDETERMINADO     { background: rgba(100,116,139,.1); color: #64748b; }

/* status existencia */
.s-ENCONTRADO            { color: #22c55e; font-weight: 600; }
.s-EXISTE_COM_DIVERGENCIA{ color: #eab308; font-weight: 600; }
.s-NAO_ENCONTRADO        { color: #ef4444; font-weight: 600; }
.s-FORMATO_INVALIDO      { color: #ef4444; font-weight: 600; }
.s-ERRO_FONTE            { color: #f97316; font-weight: 600; }
.s-FONTE_NAO_COBERTA     { color: #64748b; font-weight: 600; }
.s-DESCONHECIDO          { color: #64748b; font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">

  <h1>Verificador Juridico IA</h1>
  <p class="sub">Verifica se referencias juridicas existem, o que dizem e se sao adequadas ao contexto da peticao.</p>

  <div class="card">
    <div id="warnFile" class="warn">
      Voce abriu este arquivo diretamente (<code>file://</code>). Rode o servidor primeiro:<br>
      <code>npm run dev</code> e depois acesse <code>http://localhost:3000</code>
    </div>

    <div class="casos">
      <span class="caso-label">Casos do desafio:</span>
      <button class="caso-btn" id="caso1btn">Caso 1 - REsp 1.810.170/RS</button>
      <button class="caso-btn" id="caso2btn">Caso 2 - 0815641-45.2025.8.10.0040</button>
    </div>

    <div class="field">
      <label for="ref">Referencia juridica</label>
      <input type="text" id="ref" placeholder="Ex: REsp 1.810.170/RS">
    </div>

    <div class="field">
      <label for="ctx">Contexto da peticao</label>
      <textarea id="ctx" placeholder="Cole aqui o trecho da peticao onde a referencia e citada..."></textarea>
    </div>

    <button class="btn" id="btnVerificar">
      <span class="spinner" id="spinner"></span>
      <span id="btnLabel">Verificar</span>
    </button>
    <div class="progress" id="progress"><div class="progress-bar"></div></div>
  </div>

  <div id="result"></div>

</div>

<script>
(function() {
  var CASO1 = {
    ref: "REsp 1.810.170/RS",
    ctx: "Conforme entendimento pacificado no STJ, a cobranca de taxa de conveniencia e abusiva ao consumidor, como decidido no REsp 1.810.170/RS, razao pela qual deve ser reconhecida a ilegalidade da cobranca no presente caso."
  };
  var CASO2 = {
    ref: "0815641-45.2025.8.10.0040",
    ctx: "No ambito deste Egregio Tribunal de Justica do Estado do Maranhao, cumpre citar o precedente firmado nos autos do processo n 0815641-45.2025.8.10.0040, que consolidou entendimento favoravel a tese ora defendida."
  };

  if (location.protocol === "file:") {
    document.getElementById("warnFile").style.display = "block";
  }

  document.getElementById("caso1btn").addEventListener("click", function() {
    document.getElementById("ref").value = CASO1.ref;
    document.getElementById("ctx").value = CASO1.ctx;
    document.getElementById("result").innerHTML = "";
  });

  document.getElementById("caso2btn").addEventListener("click", function() {
    document.getElementById("ref").value = CASO2.ref;
    document.getElementById("ctx").value = CASO2.ctx;
    document.getElementById("result").innerHTML = "";
  });

  document.getElementById("btnVerificar").addEventListener("click", function() {
    verificar();
  });

  document.addEventListener("keydown", function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") verificar();
  });

  function verificar() {
    var ref = document.getElementById("ref").value.trim();
    var ctx = document.getElementById("ctx").value.trim();

    if (!ref || !ctx) {
      alert("Preencha a referencia e o contexto.");
      return;
    }

    var btn      = document.getElementById("btnVerificar");
    var spinner  = document.getElementById("spinner");
    var label    = document.getElementById("btnLabel");
    var result   = document.getElementById("result");
    var progress = document.getElementById("progress");

    btn.disabled         = true;
    spinner.style.display = "block";
    label.textContent    = "Consultando fontes oficiais...";
    progress.style.display = "block";
    result.innerHTML     = "";

    fetch("/verificar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ referencia: ref, contexto: ctx })
    })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      if (data.error) {
        result.innerHTML = '<div class="err">Erro: ' + data.error + '</div>';
      } else {
        result.innerHTML = renderResult(data);
      }
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    })
    .catch(function(err) {
      result.innerHTML = '<div class="err">Erro de conexao: ' + err.message + '</div>';
    })
    .finally(function() {
      btn.disabled          = false;
      spinner.style.display = "none";
      label.textContent     = "Verificar";
      progress.style.display = "none";
    });
  }

  function renderResult(d) {
    var rc = (d.recomendacao || "").toLowerCase();

    var html = "";

    html += '<div class="banner bg-' + rc + '">';
    html += '<div>';
    html += '<div class="banner-ref">' + (d.referencia_normalizada || "") + " &middot; " + (d.tribunal_inferido || "?") + '</div>';
    html += '<div class="banner-rec c-' + rc + '">' + (d.recomendacao || "") + '</div>';
    html += '</div>';
    html += '<div class="banner-urg">Urgencia: ' + (d.nivel_urgencia || "") + '</div>';
    html += '</div>';

    html += '<div class="grid">';

    // Existencia
    var ex = d.existencia || {};
    html += '<div class="card">';
    html += '<h2>Existencia</h2>';
    html += row("Status", '<span class="s-' + (ex.status || "") + '">' + (ex.status || "—") + '</span>');
    if (ex.numero_real) html += row("Numero real", ex.numero_real);
    html += row("Fonte", ex.fonte || "—");
    if (ex.url_fonte) html += '<div class="row"><span class="rk">Link</span><span class="rv"><a href="' + ex.url_fonte + '" target="_blank">Abrir fonte</a></span></div>';
    html += '<div style="margin-top:.6rem"><span class="rk" style="display:block;margin-bottom:.3rem">Flags</span>' + renderFlags(ex.flags) + '</div>';
    html += '</div>';

    // Conteudo
    var co = d.conteudo || {};
    html += '<div class="card">';
    html += '<h2>Conteudo</h2>';
    html += row("Assunto real", co.assunto_real || "—");
    html += row("Dispositivo", co.dispositivo || "—");
    html += row("Grau", co.grau || "—");
    html += row("Tema repetitivo", co.tema_repetitivo || "—");
    html += '<div style="margin-top:.6rem"><span class="rk" style="display:block;margin-bottom:.3rem">Flags</span>' + renderFlags(co.flags) + '</div>';
    html += '</div>';

    // Adequacao
    var aq = d.adequacao || {};
    html += '<div class="card" style="grid-column:1/-1">';
    html += '<h2>Adequacao contextual</h2>';
    html += row("Tese inferida na peticao", '<em style="color:#e2e8f0">' + (aq.tese_inferida_na_peticao || "—") + '</em>');
    html += row("Adequacao tematica",   pill(aq.adequacao_tematica, "t"));
    html += row("Adequacao dispositivo", pill(aq.adequacao_dispositivo, "d"));
    html += row("Peso precedencial",    pill(aq.peso_precedencial, "p"));
    html += '<div style="margin-top:.7rem"><span class="rk" style="display:block;margin-bottom:.35rem">Justificativa</span>';
    html += '<div class="just">' + (aq.justificativa || "—") + '</div></div>';
    html += '</div>';

    html += '</div>';

    // Motivos
    var meta = d._meta || {};
    if (meta.motivos && meta.motivos.length) {
      html += '<div class="card"><h2>Motivos da recomendacao</h2>';
      for (var i = 0; i < meta.motivos.length; i++) {
        html += '<div class="motivo">' + meta.motivos[i] + '</div>';
      }
      html += '</div>';
    }

    return html;
  }

  function row(key, val) {
    return '<div class="row"><span class="rk">' + key + '</span><span class="rv">' + (val !== undefined && val !== null ? val : "—") + '</span></div>';
  }

  function pill(val, prefix) {
    if (!val) return '<span class="pill" style="color:#64748b">—</span>';
    return '<span class="pill ' + prefix + '-' + val + '">' + val + '</span>';
  }

  function renderFlags(arr) {
    if (!arr || !arr.length) return '<span style="color:#64748b;font-size:.78rem">nenhuma</span>';
    var s = '<div class="flags">';
    for (var i = 0; i < arr.length; i++) {
      s += '<span class="flag">' + arr[i] + '</span>';
    }
    s += '</div>';
    return s;
  }

})();
</script>
</body>
</html>
